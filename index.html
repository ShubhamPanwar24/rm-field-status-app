<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RM Field Status Submission</title>
  <style>
    :root{--p:#1368d8;--pd:#0b4ba0;--bg:#f4f7fb;--txt:#172033;--mut:#687386;--bd:#d7dee9;--ok:#067647;--err:#b42318;--warn:#b54708}
    *{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#eef5ff,#f9fbff);color:var(--txt)}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px}.card{width:100%;max-width:590px;background:#fff;border:1px solid var(--bd);border-radius:22px;box-shadow:0 16px 44px rgba(15,42,82,.12);padding:26px}.brand{display:flex;gap:14px;align-items:center;margin-bottom:16px}.logo{width:48px;height:48px;border-radius:14px;background:var(--p);color:#fff;display:grid;place-items:center;font-weight:800}h1{font-size:24px;margin:0}.sub{margin:4px 0 0;color:var(--mut);font-size:14px}.dateBox{background:#eef5ff;border:1px dashed #9fc5ff;border-radius:14px;padding:12px 14px;margin:12px 0 20px;font-weight:700}.field{margin:15px 0}label{display:block;font-weight:700;margin:0 0 8px}select,input{width:100%;padding:13px 12px;border:1px solid var(--bd);border-radius:12px;font-size:15px;background:#fff}.statusGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.status{border:1px solid var(--bd);background:#fff;border-radius:14px;padding:13px;cursor:pointer;text-align:left;font-weight:700}.status.active{border-color:var(--p);box-shadow:0 0 0 3px rgba(19,104,216,.12);background:#f7fbff}.hint{font-size:12px;color:var(--mut);margin-top:7px}.btn{width:100%;border:0;border-radius:14px;background:var(--p);color:#fff;padding:14px 16px;font-size:16px;font-weight:800;cursor:pointer;margin-top:12px}.btn:hover{background:var(--pd)}.btn:disabled{opacity:.6;cursor:not-allowed}.msg{display:none;margin-top:14px;padding:12px;border-radius:12px;font-size:14px}.msg.ok{display:block;background:#ecfdf3;color:var(--ok);border:1px solid #abefc6}.msg.err{display:block;background:#fff1f0;color:var(--err);border:1px solid #fecdca}.msg.warn{display:block;background:#fffaeb;color:var(--warn);border:1px solid #fedf89}.footer{margin-top:16px;text-align:center;color:var(--mut);font-size:12px}@media(max-width:480px){.statusGrid{grid-template-columns:1fr}.card{padding:20px}}
  </style>
</head>
<body>
  <div class="wrap"><main class="card">
    <div class="brand"><div class="logo">RM</div><div><h1>Field Status Submission</h1><p class="sub">Select AM, RM name and today's status</p></div></div>
    <div id="dateText" class="dateBox"></div>
    <form id="statusForm">
      <div class="field"><label for="am">AM Name</label><select id="am" required><option value="">Select AM</option></select></div>
      <div class="field"><label for="rm">RM Name</label><select id="rm" required disabled><option value="">Select RM</option></select></div>
      <div class="field"><label>Status</label><div id="statusGrid" class="statusGrid"></div></div>
      <div class="field" id="otherTaskWrap" style="display:none"><label for="otherTaskName">Other Task Status Name</label><input id="otherTaskName" maxlength="120" placeholder="Example: Training, Meeting, Audit"><div class="hint">This field appears only when “Others Task” is selected.</div></div>
      <button id="submitBtn" class="btn" type="submit">Submit Status</button><div id="msg" class="msg"></div>
    </form><div class="footer">Submission date auto-changes as per current calendar date.</div>
  </main></div>
  <script src="config.js"></script>
  <script>
    const cfg=window.RM_STATUS_CONFIG||{}; const statuses=['Listing','Maintenance','Others Task','Leave']; let selectedStatus='';
    function ordinal(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}
    function formatDate(d){return `Date : ${ordinal(d.getDate())} ${d.toLocaleString('en-GB',{month:'long'})}'${String(d.getFullYear()).slice(-2)}`;}
    function isoLocalDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
    function showMsg(t,type){const m=document.getElementById('msg');m.textContent=t;m.className='msg '+type;}
    function resetStatus(){selectedStatus='';document.querySelectorAll('.status').forEach(x=>x.classList.remove('active'));document.getElementById('otherTaskWrap').style.display='none';document.getElementById('otherTaskName').value='';}
    function init(){document.getElementById('dateText').textContent=formatDate(new Date()); const am=document.getElementById('am'); Object.keys(cfg.amRmMap||{}).forEach(a=>am.add(new Option(a,a))); const grid=document.getElementById('statusGrid'); statuses.forEach(s=>{const b=document.createElement('button');b.type='button';b.className='status';b.textContent=s;b.onclick=()=>{selectedStatus=s;document.querySelectorAll('.status').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('otherTaskWrap').style.display=s==='Others Task'?'block':'none';};grid.appendChild(b);});}
    document.getElementById('am').addEventListener('change',e=>{const rm=document.getElementById('rm');rm.innerHTML='<option value="">Select RM</option>';(cfg.amRmMap[e.target.value]||[]).forEach(n=>rm.add(new Option(n,n)));rm.disabled=!e.target.value;resetStatus();});
    document.getElementById('statusForm').addEventListener('submit',async e=>{e.preventDefault(); const am=document.getElementById('am').value, rm=document.getElementById('rm').value, other=document.getElementById('otherTaskName').value.trim(); if(!am||!rm||!selectedStatus){showMsg('Please select AM, RM and status.','err');return;} if(selectedStatus==='Others Task'&&!other){showMsg('Please enter other task status name.','err');return;} const now=new Date(); const payload={secretKey:cfg.secretKey,submitDate:isoLocalDate(now),submitDateText:formatDate(now),amName:am,rmName:rm,status:selectedStatus,otherTaskName:selectedStatus==='Others Task'?other:'',submittedAt:now.toISOString(),source:'RM Field Status HTML App'}; const key=`${payload.submitDate}|${rm}`; if(localStorage.getItem(key)&&!confirm('Status already submitted from this device today. Submit again?')) return; const btn=document.getElementById('submitBtn'); btn.disabled=true; btn.textContent='Submitting...'; try{ if(!cfg.powerAutomateUrl||cfg.powerAutomateUrl.includes('PASTE_')) throw new Error('Power Automate URL not configured in config.js'); const res=await fetch(cfg.powerAutomateUrl,{method:'POST',headers:{'Content-Type':'application/json','x-rm-secret':cfg.secretKey},body:JSON.stringify(payload)}); if(!res.ok) throw new Error('Flow returned '+res.status); localStorage.setItem(key,JSON.stringify(payload)); showMsg('Status submitted successfully. Thank you!','ok'); e.target.reset(); document.getElementById('rm').disabled=true; resetStatus(); }catch(err){const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`RM_Status_${payload.rmName.replace(/[^a-z0-9]+/gi,'_')}_${payload.submitDate}.json`; a.click(); showMsg('Could not submit online. Backup JSON downloaded. Configure/check Power Automate URL and retry.','warn');} finally{btn.disabled=false;btn.textContent='Submit Status';}});
    init();
  </script>
</body>
</html>
